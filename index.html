let cd=0,cs=-1;

function render(){
  const day=days[cd];
  // tabs
  const tabs=document.getElementById('tabs');
  tabs.innerHTML='';
  days.forEach((d,i)=>{
    const b=document.createElement('button');
    b.className='db'+(i===cd?' on':'');
    b.textContent=d.label;
    b.onclick=()=>{cd=i;cs=-1;render()};
    tabs.appendChild(b);
  });
  // youtube
  const yt=day.yt;
  document.getElementById('ytimg').src='https://img.youtube.com/vi/'+yt.id+'/mqdefault.jpg';
  document.getElementById('ytname').textContent=yt.title;
  document.getElementById('ytthumb').href='https://www.youtube.com/watch?v='+yt.id;
  document.getElementById('ytlink').href='https://www.youtube.com/watch?v='+yt.id;
  // day title
  document.getElementById('dtitle').textContent=day.full;
  // stops
  const el=document.getElementById('stops');
  el.innerHTML='';
  day.stops.forEach((s,i)=>{
    const card=document.createElement('div');
    card.className='stop-card'+(i===cs?' active':'');
    const igBtn=s.ig?`<a class="ig-btn" href="${s.ig}" target="_blank">📷 IG 看照片</a>`:'';
    card.innerHTML=`
      <div class="stop-icon">${s.icon}</div>
      <div class="stop-main">
        <div class="stop-name">${s.name}</div>
        <div class="stop-time">🕐 ${s.time}</div>
        <div class="stop-body">
          <div class="stop-desc">${s.desc}</div>
          <div class="stop-tip">💡 ${s.tip}</div>
          <div class="btn-row">
            <a class="map-btn" href="${s.map}" target="_blank">📍 Google Maps</a>
            ${igBtn}
          </div>
        </div>
      </div>
      <div class="chevron">${i===cs?'▲':'▼'}</div>`;
    card.onclick=()=>{cs=(cs===i?-1:i);render()};
    el.appendChild(card);
  });
}
render();
