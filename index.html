<style>
:root {
  --green: #0B6E4F;
  --green-light: #E6F4EE;
  --green-mid: #1D9E75;
  --orange: #E8650A;
  --orange-light: #FFF0E6;
  --sand: #F7F3EE;
  --ink: #1C1C1C;
  --muted: #6B6B6B;
  --border: #E0DAD3;
  --white: #FFFFFF;
  --radius: 12px;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--sand);
  color: var(--ink);
  min-height: 100vh;
}

/* ── HEADER ── */
.header {
  background: var(--green);
  padding: 1.5rem 1rem 1.25rem;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.header::before {
  content: '';
  position: absolute;
  inset: 0;
  background: radial-gradient(ellipse at 70% 50%, rgba(255,255,255,0.07) 0%, transparent 60%);
  pointer-events: none;
}
.header-emoji { font-size: 28px; display: block; margin-bottom: 6px; }
.header h1 {
  font-family: 'Noto Serif TC', serif;
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 0.02em;
  margin-bottom: 4px;
}
.header p { font-size: 12px; color: rgba(255,255,255,0.75); letter-spacing: 0.03em; }

/* ── CONTAINER ── */
.container { max-width: 720px; margin: 0 auto; padding: 1rem; }

/* ── DAY TABS ── */
.day-tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
.db {
  padding: 6px 15px;
  border-radius: 20px;
  border: 1.5px solid var(--border);
  background: var(--white);
  color: var(--muted);
  font-size: 12.5px;
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
  font-weight: 500;
}
.db:hover { border-color: var(--green-mid); color: var(--green); }
.db.on { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }

/* ── MAP ── */
#map {
  width: 100%;
  height: 260px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 0.6rem;
  box-shadow: var(--shadow);
}
.map-hint {
  font-size: 11.5px;
  color: var(--muted);
  margin-bottom: 0.9rem;
  display: flex;
  align-items: center;
  gap: 5px;
  padding-left: 2px;
}

/* ── DAY TITLE ── */
.day-title {
  font-family: 'Noto Serif TC', serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--green);
  margin-bottom: 0.75rem;
  padding-bottom: 0.5rem;
  border-bottom: 1.5px solid var(--green-light);
}

/* ── SECTION HEADER ── */
.section-header {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 6px;
  margin: 0.9rem 0 0.5rem;
  display: inline-block;
}
.section-header.main { background: var(--green-light); color: var(--green); }
.section-header.alt { background: var(--orange-light); color: var(--orange); }

/* ── STOP CARDS ── */
.stops { display: flex; flex-direction: column; gap: 6px; margin-bottom: 1.5rem; }
.stop-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 14px;
  cursor: pointer;
  display: flex;
  align-items: flex-start;
  gap: 11px;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.stop-card:hover { border-color: var(--green-mid); box-shadow: 0 2px 8px rgba(11,110,79,0.08); }
.stop-card.active { border-color: var(--green); border-left: 3px solid var(--green); background: #FDFFFE; box-shadow: var(--shadow); }
.stop-card.alt-card { border-style: dashed; background: #FEFCFA; }
.stop-card.alt-card.active { border-color: var(--orange); border-left: 3px solid var(--orange); border-style: solid; }
.stop-icon { font-size: 19px; flex-shrink: 0; line-height: 1.3; margin-top: 1px; }
.stop-main { flex: 1; min-width: 0; }
.stop-name { font-size: 13.5px; font-weight: 600; color: var(--ink); margin-bottom: 2px; line-height: 1.4; }
.stop-time { font-size: 11px; color: var(--muted); }
.alt-tag { font-size: 10px; background: var(--orange-light); color: var(--orange); padding: 1px 7px; border-radius: 4px; margin-left: 6px; font-weight: 500; vertical-align: middle; }
.chevron { font-size: 11px; color: #C0BAB2; margin-left: auto; flex-shrink: 0; margin-top: 4px; transition: transform 0.2s; user-select: none; }
.active .chevron { transform: rotate(180deg); }

/* ── STOP BODY ── */
.stop-body { display: none; margin-top: 10px; padding-top: 10px; border-top: 1px solid #F0EBE5; }
.active .stop-body { display: block; }
.stop-desc { font-size: 13px; color: #333; line-height: 1.8; margin-bottom: 8px; }
.stop-options {
  font-size: 12.5px;
  color: #3A3A3A;
  background: var(--sand);
  padding: 9px 12px;
  border-radius: 8px;
  line-height: 1.9;
  margin-bottom: 8px;
  border: 1px solid var(--border);
}
.stop-hours { font-size: 11.5px; color: var(--muted); margin-bottom: 9px; display: flex; align-items: flex-start; gap: 4px; }
.stop-tip {
  font-size: 12.5px;
  color: #084D37;
  background: var(--green-light);
  padding: 8px 12px;
  border-radius: 8px;
  line-height: 1.7;
  margin-bottom: 10px;
  border-left: 3px solid var(--green-mid);
}

/* ── MUST-EAT BOX ── */
.must-eat {
  background: linear-gradient(135deg, #FFF8F0 0%, #FFF3E8 100%);
  border: 1px solid #F5C89A;
  border-radius: 8px;
  padding: 9px 12px;
  margin-bottom: 10px;
}
.must-eat-title { font-size: 10.5px; font-weight: 700; color: var(--orange); letter-spacing: 0.05em; margin-bottom: 5px; }
.must-eat-items { font-size: 12.5px; color: #3A2010; line-height: 1.85; }

/* ── BTN ROW ── */
.btn-row { display: flex; gap: 6px; flex-wrap: wrap; }
.btn {
  font-size: 12px;
  padding: 5px 12px;
  border-radius: 7px;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-weight: 500;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.8; }
.btn-map { color: var(--green); border: 1px solid #7ECFAF; background: var(--green-light); }
.btn-ig { color: #7B2FBE; border: 1px solid #C89EE8; background: #F5EFFE; }
.btn-yt { color: #C0392B; border: 1px solid #F0A9A3; background: #FEF0EF; }

/* ── YT SECTION ── */
.yt-section-label {
  font-size: 10.5px;
  font-weight: 700;
  letter-spacing: 0.06em;
  color: #C0392B;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
  padding-left: 8px;
  border-left: 3px solid #C0392B;
}
.yt-card {
  background: var(--white);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 15px;
  display: flex;
  align-items: center;
  gap: 13px;
  margin-bottom: 2rem;
  box-shadow: var(--shadow);
}
.yt-thumb {
  width: 106px;
  height: 60px;
  border-radius: 8px;
  background: #111;
  flex-shrink: 0;
  position: relative;
  overflow: hidden;
  display: block;
  text-decoration: none;
}
.yt-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
.yt-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; background: rgba(0,0,0,0.28); }
.yt-play {
  width: 30px; height: 30px;
  background: #C0392B;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 12px; padding-left: 2px;
}
.yt-info { flex: 1; min-width: 0; }
.yt-label { font-size: 10.5px; color: #C0392B; margin-bottom: 3px; font-weight: 600; letter-spacing: 0.03em; }
.yt-title { font-size: 13px; font-weight: 500; color: var(--ink); line-height: 1.4; margin-bottom: 8px; }
.yt-open {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: #fff;
  background: #C0392B; border-radius: 6px;
  padding: 5px 12px; text-decoration: none;
}

/* ── FOOTER ── */
.footer { text-align: center; padding: 1.5rem 1rem 2.5rem; font-size: 11.5px; color: #B0A89E; }

/* ── RESPONSIVE ── */
@media(max-width:480px) {
  #map { height: 210px; }
  .header h1 { font-size: 17px; }
  .yt-thumb { width: 88px; height: 50px; }
}
</style>
</head>

// ── MAP SETUP ──────────────────────────────────────
const map = L.map('map', { zoomControl:true, scrollWheelZoom:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution:'© OpenStreetMap', maxZoom:19
}).addTo(map);

const dayColors = ['#0B6E4F','#185FA5','#8B3A20','#27500A','#3B6D11','#8B3A70'];
let markers = [];
let cd = 0, cs = -1;

function clearMarkers() { markers.forEach(m => map.removeLayer(m)); markers = []; }

function makeIcon(color, label, big) {
  const s = big ? 32 : 24;
  return L.divIcon({
    className:'',
    html:`<div style="background:${color};color:#fff;width:${s}px;height:${s}px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:${big?12:9}px;font-weight:700;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,0.25)">${label}</div>`,
    iconSize:[s,s], iconAnchor:[s/2,s/2]
  });
}

// ── RENDER ─────────────────────────────────────────
function render() {
  const day = days[cd];

  // tabs
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = '';
  days.forEach((d,i) => {
    const b = document.createElement('button');
    b.className = 'db' + (i===cd ? ' on' : '');
    b.textContent = d.label;
    b.onclick = () => { cd=i; cs=-1; render(); };
    tabs.appendChild(b);
  });

  // map
  clearMarkers();
  map.setView(day.center, day.zoom);
  const color = dayColors[cd];
  let mainN = 0;
  day.stops.forEach((s,i) => {
    if (!s.lat || !s.lng) return;
    const isAlt = !!s.alt;
    if (!isAlt) mainN++;
    const label = isAlt ? '★' : mainN;
    const icon = makeIcon(isAlt ? '#AAA6A0' : color, label, !isAlt);
    const m = L.marker([s.lat, s.lng], { icon }).addTo(map);
    m.bindPopup(`<b>${s.icon} ${s.name}</b><br><small style="color:#777">${s.time}</small>`);
    m.on('click', () => { cs=i; buildStops(); m.openPopup(); });
    markers.push(m);
  });

  // youtube
  const yt = day.yt;
  document.getElementById('ytimg').src = `https://img.youtube.com/vi/${yt.id}/mqdefault.jpg`;
  document.getElementById('ytname').textContent = yt.title;
  document.getElementById('ytthumb').href = `https://www.youtube.com/watch?v=${yt.id}`;
  document.getElementById('ytlink').href = `https://www.youtube.com/watch?v=${yt.id}`;

  document.getElementById('dtitle').textContent = day.full;
  buildStops();
}

function buildStops() {
  const day = days[cd];
  const el = document.getElementById('stops');
  el.innerHTML = '';
  let lastAlt = null, mainN = 0;

  day.stops.forEach((s, i) => {
    const isAlt = !!s.alt;

    // section headers
    if (isAlt !== lastAlt) {
      const h = document.createElement('div');
      h.className = 'section-header ' + (isAlt ? 'alt' : 'main');
      h.textContent = isAlt ? '備選 / 加選景點' : '主要行程';
      el.appendChild(h);
      lastAlt = isAlt;
    }

    if (!isAlt) mainN++;

    const card = document.createElement('div');
    card.className = 'stop-card' + (i===cs ? ' active' : '') + (isAlt ? ' alt-card' : '');

    // build body
    let body = '';
    if (s.desc) body += `<div class="stop-desc">${s.desc}</div>`;
    if (s.options) body += `<div class="stop-options">${s.options.replace(/\n/g,'<br>')}</div>`;
    if (s.musthave) body += `<div class="must-eat"><div class="must-eat-title">${s.musthave.title}</div><div class="must-eat-items">${s.musthave.items.replace(/\n/g,'<br>')}</div></div>`;
    if (s.hours) body += `<div class="stop-hours">${s.hours}</div>`;
    if (s.tip) body += `<div class="stop-tip">💡 ${s.tip}</div>`;

    let btns = '';
    if (s.map) btns += `<a class="btn btn-map" href="${s.map}" target="_blank">📍 Google Maps</a>`;
    if (s.ig) btns += `<a class="btn btn-ig" href="${s.ig}" target="_blank">📷 IG 看照片</a>`;
    if (btns) body += `<div class="btn-row">${btns}</div>`;

    const altTag = isAlt ? '<span class="alt-tag">備選</span>' : '';

    card.innerHTML = `
      <div class="stop-icon">${s.icon}</div>
      <div class="stop-main">
        <div class="stop-name">${s.name}${altTag}</div>
        <div class="stop-time">${s.time}</div>
        <div class="stop-body">${body}</div>
      </div>
      <div class="chevron">${i===cs ? '▲' : '▼'}</div>`;

    card.onclick = () => {
      cs = (cs===i ? -1 : i);
      if (cs===i && s.lat && s.lng) {
        map.flyTo([s.lat, s.lng], 15, { duration:0.7 });
        if (markers[i]) markers[i].openPopup();
      }
      buildStops();
    };
    el.appendChild(card);
  });
}

render();
</script>
